<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
<script src="https://cdn.tailwindcss.com"></script>

<title>لعبة مافيا برو</title>

<style>
/* (نفس CSS بدون تغيير) */
body { font-size: 16px; background: radial-gradient(circle at top, #0f172a, #020617); font-family: 'Tajawal', sans-serif; }

.card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border-radius: 16px; }

.dead { opacity: 0.4; filter: grayscale(100%); text-decoration: line-through; }

#mic-btn { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #4ade80; background: radial-gradient(circle, #2563eb, #1e3a8a); font-size: 30px; }

#mic-btn.recording { background: radial-gradient(circle, #dc2626, #7f1d1d); animation: pulse 1s infinite; }

@keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.7);} 70% { box-shadow: 0 0 0 20px rgba(239,68,68,0);} 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0);} }
</style>
</head>

<body class="bg-gray-900 text-white p-4">

<div class="max-w-xl mx-auto text-center card p-4">

<h1 class="text-2xl font-bold mb-4">🎭 لعبة مافيا برو</h1>

<div id="setup-area">
<input id="username" placeholder="اسم المستخدم" class="p-2 text-black rounded">
<input id="password" placeholder="كلمة المرور" class="p-2 text-black rounded">
<br><br>
<input id="roomId" placeholder="رقم الغرفة" class="p-2 text-black rounded">

<button onclick="createRoom()" class="bg-blue-500 px-4 py-2 rounded">إنشاء</button>
<button onclick="joinRoom()" class="bg-green-500 px-4 py-2 rounded">دخول</button>
</div>

<div id="chat-area" class="hidden mt-4">
<div id="chat-box"></div>
<input id="chat-input" class="p-2 text-black">
</div>

<div id="voice-setup" class="hidden">
<button id="mic-btn">🎤</button>
<div id="voice-status-text"></div>
<div id="volume-bar"></div>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let currentRoom, myId, myRole;
let isDead = false;
let currentPhase = "lobby";

let mediaRecorder;
let analyser;
let audioContext;
let microphone;
let recordedChunks = [];
let isRecording = false;

let peerConnections = {};
let localStream;
let isLeader = false;

/* ================= SOCKET ================= */

socket.on("connect", () => myId = socket.id);

function createRoom() {
    socket.emit("createRoom", {
        username: username.value,
        password: password.value
    });
}

function joinRoom() {
    currentRoom = roomId.value.trim();

    socket.emit("joinRoom", {
        roomId: currentRoom,
        username: username.value,
        password: password.value
    });
}

/* ================= JOIN SUCCESS ================= */

socket.on("joinedRoomSuccess", () => {
    document.getElementById("setup-area").classList.add("hidden");
    document.getElementById("chat-area").classList.remove("hidden");
    document.getElementById("voice-setup").classList.remove("hidden");

    initializeAudio();
    startLiveVoice();
});

/* ================= AUDIO ================= */

async function initializeAudio() {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    audioContext = new AudioContext();
    analyser = audioContext.createAnalyser();

    microphone = audioContext.createMediaStreamSource(stream);
    microphone.connect(analyser);

    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = e => {
        if (e.data.size > 0) recordedChunks.push(e.data);
    };

    mediaRecorder.onstop = () => {
        const blob = new Blob(recordedChunks, { type: "audio/webm" });
        recordedChunks = [];

        const reader = new FileReader();
        reader.onload = () => {
            socket.emit("voiceMessage", {
                roomId: currentRoom,
                audioData: reader.result,
                sender: username.value
            });
        };
        reader.readAsArrayBuffer(blob);
    };
}

/* ================= RECORD ================= */

micBtn.onmousedown = () => {
    if (!mediaRecorder) return;
    isRecording = true;
    recordedChunks = [];
    mediaRecorder.start();
};

micBtn.onmouseup = () => {
    if (!mediaRecorder) return;
    isRecording = false;
    mediaRecorder.stop();
};

/* ================= LIVE VOICE ================= */

async function startLiveVoice() {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

    socket.emit("joinVoice", { roomId: currentRoom });
}

/* ================= FIXED UPDATE PLAYERS (IMPORTANT FIX) ================= */

socket.on("updatePlayers", async (players) => {
    if (!localStream) return;

    players.forEach(async (p) => {
        if (p.id === myId) return;
        if (peerConnections[p.id]) return;

        const pc = new RTCPeerConnection({
            iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
        });

        localStream.getTracks().forEach(track =>
            pc.addTrack(track, localStream)
        );

        pc.ontrack = (event) => {
            const audio = document.createElement("audio");
            audio.autoplay = true;
            audio.srcObject = event.streams[0];
            document.body.appendChild(audio);
        };

        pc.onicecandidate = (event) => {
            if (event.candidate) {
                socket.emit("webrtc-ice-candidate", {
                    roomId: currentRoom,
                    candidate: event.candidate
                });
            }
        };

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        socket.emit("webrtc-offer", {
            roomId: currentRoom,
            offer
        });

        peerConnections[p.id] = pc;
    });
});

/* ================= WEBRTC ================= */

socket.on("webrtc-offer", async ({ offer, from }) => {
    const pc = new RTCPeerConnection();

    localStream.getTracks().forEach(track =>
        pc.addTrack(track, localStream)
    );

    await pc.setRemoteDescription(offer);

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    socket.emit("webrtc-answer", {
        roomId: currentRoom,
        answer
    });

    peerConnections[from] = pc;
});

socket.on("webrtc-answer", async ({ answer, from }) => {
    if (peerConnections[from]) {
        await peerConnections[from].setRemoteDescription(answer);
    }
});

socket.on("webrtc-ice-candidate", ({ candidate, from }) => {
    if (peerConnections[from]) {
        peerConnections[from].addIceCandidate(
            new RTCIceCandidate(candidate)
        );
    }
});
</script>

</body>
</html>
