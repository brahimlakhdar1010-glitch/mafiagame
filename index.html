</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
let currentRoom, myId, isDead = false;

// ===== الصوت =====
let mediaRecorder;
let audioContext;
let analyser;
let microphone;
let isRecording = false;
let recordedChunks = [];

const micBtn = document.getElementById('mic-btn');
const volumeBar = document.getElementById('volume-bar');
const voiceStatusText = document.getElementById('voice-status-text');
const voiceSetup = document.getElementById('voice-setup');

socket.on("connect", () => { myId = socket.id; });

// إنشاء غرفة
function createRoom() {
    const user = document.getElementById("username").value;
    socket.emit("createRoom", { username: user, password: document.getElementById("password").value });
}

// عند إنشاء الغرفة
socket.on("roomCreated", d => { 
    currentRoom = d.roomId; 
    alert("غرفة رقم: " + d.roomId);
    initializeAudio(); // يعمل كما كان
});

// ✅ تم الإصلاح هنا
function joinRoom() { 
    currentRoom = document.getElementById("roomId").value; 
    socket.emit("joinRoom", { 
        roomId: currentRoom, 
        username: document.getElementById("username").value, 
        password: document.getElementById("password").value 
    });

    // 🔥 الجديد: تفعيل الصوت للجميع
    initializeAudio();
}

// تهيئة الصوت
async function initializeAudio() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        microphone = audioContext.createMediaStreamSource(stream);
        microphone.connect(analyser);

        mediaRecorder = new MediaRecorder(stream);

        mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) recordedChunks.push(e.data);
        };

        mediaRecorder.onstop = () => {
            const audioBlob = new Blob(recordedChunks);
            recordedChunks = [];

            const reader = new FileReader();
            reader.onload = () => {
                socket.emit("voiceMessage", {
                    roomId: currentRoom,
                    audioData: reader.result,
                    sender: document.getElementById("username").value
                });
            };
            reader.readAsArrayBuffer(audioBlob);
        };

        voiceSetup.classList.remove('hidden');
        voiceStatusText.textContent = "✅ الميكروفون جاهز";

    } catch (err) {
        voiceStatusText.textContent = "❌ يجب السماح بالمايك";
        alert("يرجى السماح باستخدام الميكروفون");
    }
}

// ===== دوال التسجيل =====
function startRecording() {
    if (!isRecording && mediaRecorder && !isDead) {
        isRecording = true;
        recordedChunks = [];
        mediaRecorder.start();
        micBtn.classList.add('recording');
        voiceStatusText.textContent = "🔴 تسجيل...";
        startVolumeMonitor();
    }
}

function stopRecording() {
    if (isRecording && mediaRecorder) {
        isRecording = false;
        mediaRecorder.stop();
        micBtn.classList.remove('recording');
        voiceStatusText.textContent = "✅ تم الإرسال";
        setTimeout(() => {
            voiceStatusText.textContent = "✅ جاهز";
        }, 1500);
    }
}

// ===== دعم الكمبيوتر + الهاتف =====
micBtn.addEventListener("mousedown", startRecording);
document.addEventListener("mouseup", stopRecording);

micBtn.addEventListener("touchstart", startRecording);
document.addEventListener("touchend", stopRecording);

// مراقبة الصوت
function startVolumeMonitor() {
    const dataArray = new Uint8Array(analyser.frequencyBinCount);
    function monitor() {
        if (!isRecording) return;
        analyser.getByteFrequencyData(dataArray);
        const avg = dataArray.reduce((a,b)=>a+b)/dataArray.length;
        volumeBar.style.width = (avg/255*100)+"%";
        requestAnimationFrame(monitor);
    }
    monitor();
}

// استقبال الصوت
socket.on("receiveVoiceMessage", (data) => {
    const box = document.getElementById("chat-box");
    const div = document.createElement("div");
    div.className = "voice-message";

    const audio = document.createElement("audio");
    audio.controls = true;
    audio.src = URL.createObjectURL(new Blob([data.audioData]));

    div.innerHTML = `<b>🎤 ${data.sender}</b>`;
    div.appendChild(audio);

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
});
</script>
