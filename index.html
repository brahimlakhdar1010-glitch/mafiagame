<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://cdn.tailwindcss.com"></script>
<title>لعبة مافيا برو</title>
<style>
.dead { opacity: 0.5; pointer-events: none; text-decoration: line-through; }
#chat-box { height: 200px; overflow-y: auto; }
body { font-size: 16px; }
input, button { font-size: 14px !important; }
</style>
</head>

<body class="bg-gray-900 text-white p-4 md:p-6 text-right">
<div class="max-w-xl mx-auto text-center">

<h1 class="text-2xl md:text-3xl font-bold mb-4">🎭 لعبة مافيا برو</h1>

<div id="timer-display" class="hidden text-3xl font-mono text-red-500 mb-4 bg-black p-2 rounded border-2 border-red-900">00:00</div>
<div id="news-bar" class="bg-blue-900 p-2 my-2 rounded hidden italic"></div>

<div id="setup-area" class="space-y-2">
<input id="username" class="p-2 text-black" placeholder="اسم المستخدم" />
<input id="password" class="p-2 text-black" placeholder="كلمة المرور" />
<br>
<button onclick="createRoom()" class="bg-blue-500 px-4 py-2 rounded">إنشاء غرفة</button>

<div class="py-2 text-gray-500">أو</div>

<input id="roomId" class="p-2 text-black" placeholder="رقم الغرفة" />
<button onclick="joinRoom()" class="bg-green-500 px-4 py-2 rounded">انضمام</button>
</div>

<hr class="my-4">

<h2>المرحلة: <span id="phase-text">الانتظار</span></h2>
<div id="my-role"></div>

<ul id="players-list"></ul>

<div id="chat-area" class="mt-4 hidden">
<div id="chat-box"></div>
<input id="chat-input" />
<button onclick="sendMessage()">إرسال</button>

<!-- 🎤 VOICE -->
<div class="mt-3">
<button onclick="startVoice()" class="bg-red-600 px-4 py-2 rounded">🎤 تشغيل الصوت</button>
<button onclick="stopVoice()" class="bg-gray-600 px-4 py-2 rounded">🔇 إيقاف</button>
</div>

</div>

<div id="controls">
<button onclick="startGame()">بدء</button>
<button onclick="endDay()">إنهاء اليوم</button>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let currentRoom, myId, myRole, isDead=false, currentPhase="lobby";

socket.on("connect", ()=>{ myId = socket.id });

// ======== VOICE SYSTEM ========
let localStream;
let peers = {};

async function startVoice() {
if(currentPhase!=="day"){ alert("الصوت فقط في النهار"); return; }

localStream = await navigator.mediaDevices.getUserMedia({ audio:true });

socket.emit("voice-join", currentRoom);

socket.on("voice-users", users=>{
users.forEach(id=>createPeer(id,true));
});

socket.on("voice-offer", async data=>{
const peer=createPeer(data.from,false);
await peer.setRemoteDescription(new RTCSessionDescription(data.offer));
const answer=await peer.createAnswer();
await peer.setLocalDescription(answer);

socket.emit("voice-answer",{to:data.from,answer,roomId:currentRoom});
});

socket.on("voice-answer", async data=>{
await peers[data.from].setRemoteDescription(new RTCSessionDescription(data.answer));
});

socket.on("voice-ice", data=>{
peers[data.from].addIceCandidate(new RTCIceCandidate(data.candidate));
});
}

function createPeer(id,init){
const peer=new RTCPeerConnection();

localStream.getTracks().forEach(t=>peer.addTrack(t,localStream));

peer.ontrack=e=>{
const audio=document.createElement("audio");
audio.srcObject=e.streams[0];
audio.autoplay=true;
};

peer.onicecandidate=e=>{
if(e.candidate){
socket.emit("voice-ice",{to:id,candidate:e.candidate,roomId:currentRoom});
}
};

if(init){
peer.createOffer().then(o=>{
peer.setLocalDescription(o);
socket.emit("voice-offer",{to:id,offer:o,roomId:currentRoom});
});
}

peers[id]=peer;
return peer;
}

function stopVoice(){
Object.values(peers).forEach(p=>p.close());
peers={};
if(localStream){localStream.getTracks().forEach(t=>t.stop());}
}

// ===== باقي كودك بدون تغيير =====

function createRoom(){
socket.emit("createRoom",{username:username.value,password:password.value});
}

function joinRoom(){
currentRoom=roomId.value;
socket.emit("joinRoom",{roomId:currentRoom,username:username.value,password:password.value});
}

function startGame(){socket.emit("startGame",currentRoom);}
function endDay(){socket.emit("endDay",currentRoom);}
</script>
</body>
</html>
