<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مافيا - نسخة احترافية</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        #login-screen { padding: 20px; text-align: center; }
        input { display: block; margin: 10px auto; padding: 10px; width: 250px; border-radius: 5px; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        #mic-btn { background: #22c55e; color: white; border: none; margin: 10px; }
        #chatBox { width: 350px; height: 300px; background: #1e293b; overflow-y: auto; padding: 10px; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>🎙️ مافيا Oasis</h1>
        <input type="text" id="playerName" placeholder="اسمك">
        <input type="text" id="roomName" placeholder="رقم الغرفة">
        <input type="password" id="roomPass" placeholder="الرقم السري (اختياري)">
        <button onclick="joinGame()" style="background: #e94560; color:white;">دخول</button>
    </div>

    <div id="game-screen" style="display:none;">
        <button id="mic-btn" onclick="toggleMic()">🎤 الميكروفون: يعمل</button>
        <div id="status">انتظار اللاعبين...</div>
        <div id="role-display" style="color:#fbbf24;">دورك: ؟</div>
        <div id="chatBox"></div>
        <input type="text" id="msgInput" placeholder="رسالة...">
        <button onclick="sendChat()">إرسال</button>
    </div>

    <script>
        const socket = io();
        let myStream, micEnabled = true, myRole;

        // وظيفة التحدث بصوت رجالي حاد وجدي
        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ar-SA';
            msg.pitch = 0.4; // طبقة صوت منخفضة (رجالية)
            msg.rate = 0.85; // سرعة بطيئة توحي بالجدية
            window.speechSynthesis.speak(msg);
        }

        async function joinGame() {
            const name = document.getElementById('playerName').value;
            const room = document.getElementById('roomName').value;
            const password = document.getElementById('roomPass').value;
            
            if (name && room) {
                try {
                    myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    socket.emit('joinRoom', { name, room, password });
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('game-screen').style.display = 'block';
                } catch (e) { alert("الميكروفون مطلوب!"); }
            }
        }

        function toggleMic() {
            micEnabled = !micEnabled;
            myStream.getAudioTracks()[0].enabled = micEnabled;
            const btn = document.getElementById('mic-btn');
            btn.innerText = micEnabled ? "🎤 الميكروفون: يعمل" : "🔇 الميكروفون: مكتوم";
            btn.style.background = micEnabled ? "#22c55e" : "#ef4444";
        }

        socket.on('newMessage', d => {
            const div = document.createElement('div');
            div.innerHTML = `<b>${d.sender}:</b> ${d.text}`;
            document.getElementById('chatBox').appendChild(div);
            if (d.sender === "النظام") speak(d.text);
        });

        socket.on('assignRole', r => {
            myRole = r;
            document.getElementById('role-display').innerText = "دورك: " + r;
            speak("لقد بدأنا. دورك هو " + r);
        });

        // بقية أكواد الـ WebRTC (SimplePeer) تضاف هنا كما في النسخة السابقة
    </script>
</body>
</html>
