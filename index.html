<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Mafia Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f0f0f;
    color: white;
}
.container { display: flex; height: 100vh; }
.sidebar { width: 250px; background: #1a1a1a; padding: 10px; }
.player { padding: 10px; margin: 5px 0; background: #222; border-radius: 8px; display:flex; gap:10px; }
.main { flex: 1; display: flex; flex-direction: column; }
.top { padding: 10px; background: #111; }
.bottom { padding: 10px; background: #111; display: flex; gap: 10px; }
#talk-btn { background: #27ae60; }
</style>
</head>

<body>

<div class="container">
<div class="sidebar" id="players"></div>

<div class="main">
<div class="top"><span id="phase">انتظار</span></div>

<div class="bottom">
<button id="talk-btn">🎤 اضغط وتكلم</button>
</div>
</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let myRoom = prompt("رقم الغرفة");
let myName = prompt("اسمك");

socket.emit('join-room', { user: myName, room: myRoom, pass: "1234" });

let myRole = null;
let currentPhase = "waiting";

let localStream;
let peerConnections = {};
let talking = false;

const config = {
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

socket.on('your-role', (role) => {
    myRole = role;
});

socket.on('phase-change', (data) => {
    currentPhase = data.phase;
    document.getElementById('phase').innerText = data.phase;
    stopVoice();
});

socket.on('players-update', (players) => {
    const div = document.getElementById('players');
    div.innerHTML = "";

    players.forEach(p => {
        const el = document.createElement('div');
        el.className = "player";
        el.innerHTML = `<img src="${p.avatar}" width="30"> ${p.name}`;
        div.appendChild(el);
    });
});

window.onload = () => {
    const btn = document.getElementById('talk-btn');

    btn.onmousedown = startTalking;
    btn.onmouseup = stopVoice;
};

async function startTalking() {
    if (talking) return;

    try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch {
        alert("افتح الميكروفون");
        return;
    }

    socket.emit('ready', { room: myRoom });

    talking = true;
}

function stopVoice() {
    if (!talking) return;

    if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
    }

    Object.values(peerConnections).forEach(pc => pc.close());
    peerConnections = {};

    talking = false;
}

// WebRTC
socket.on('ready', async (data) => {
    if (!localStream) return;

    const pc = new RTCPeerConnection(config);
    peerConnections[data.from] = pc;

    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    pc.ontrack = (e) => {
        const audio = new Audio();
        audio.srcObject = e.streams[0];
        audio.play();
    };

    pc.onicecandidate = (e) => {
        if (e.candidate) {
            socket.emit('ice-candidate', { room: myRoom, candidate: e.candidate });
        }
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    socket.emit('offer', { room: myRoom, offer });
});

socket.on('offer', async (data) => {
    const pc = new RTCPeerConnection(config);
    peerConnections[data.from] = pc;

    if (localStream) {
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
    }

    pc.ontrack = (e) => {
        const audio = new Audio();
        audio.srcObject = e.streams[0];
        audio.play();
    };

    await pc.setRemoteDescription(data.offer);

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    socket.emit('answer', { room: myRoom, answer });
});

socket.on('answer', async (data) => {
    const pc = peerConnections[data.from];
    if (pc) await pc.setRemoteDescription(data.answer);
});

socket.on('ice-candidate', async (data) => {
    const pc = peerConnections[data.from];
    if (pc && data.candidate) await pc.addIceCandidate(data.candidate);
});
</script>

</body>
</html>
