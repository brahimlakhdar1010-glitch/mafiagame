<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Mafia</title>
</head>
<body>

<input id="user" placeholder="اسمك">
<input id="room" placeholder="الغرفة">
<input id="pass" placeholder="كلمة السر">
<button onclick="join()">دخول</button>

<button onclick="toggleMic()">🎤 تشغيل / إيقاف</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let myRoom;
let localStream;
let peerConnections = {};
let micActive = false;

const config = {
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

function join() {
    myRoom = document.getElementById('room').value;
    socket.emit('join-room', {
        user: document.getElementById('user').value,
        room: myRoom,
        pass: document.getElementById('pass').value
    });
}

async function toggleMic() {
    if (!micActive) {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

        socket.emit('ready', { room: myRoom });

        micActive = true;
        alert("الميكروفون شغال");
    } else {
        localStream.getTracks().forEach(t => t.stop());
        Object.values(peerConnections).forEach(pc => pc.close());
        peerConnections = {};
        micActive = false;
        alert("الميكروفون توقف");
    }
}

socket.on('ready', async (data) => {
    const pc = new RTCPeerConnection(config);
    peerConnections[data.from] = pc;

    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    pc.ontrack = (e) => {
        const audio = new Audio();
        audio.srcObject = e.streams[0];
        audio.play();
    };

    pc.onicecandidate = (e) => {
        if (e.candidate) {
            socket.emit('ice-candidate', {
                room: myRoom,
                candidate: e.candidate
            });
        }
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    socket.emit('offer', {
        room: myRoom,
        offer: offer
    });
});

socket.on('offer', async (data) => {
    const pc = new RTCPeerConnection(config);
    peerConnections[data.from] = pc;

    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    pc.ontrack = (e) => {
        const audio = new Audio();
        audio.srcObject = e.streams[0];
        audio.play();
    };

    pc.onicecandidate = (e) => {
        if (e.candidate) {
            socket.emit('ice-candidate', {
                room: myRoom,
                candidate: e.candidate
            });
        }
    };

    await pc.setRemoteDescription(data.offer);

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    socket.emit('answer', {
        room: myRoom,
        answer: answer
    });
});

socket.on('answer', async (data) => {
    const pc = peerConnections[data.from];
    if (pc) {
        await pc.setRemoteDescription(data.answer);
    }
});

socket.on('ice-candidate', async (data) => {
    const pc = peerConnections[data.from];
    if (pc && data.candidate) {
        await pc.addIceCandidate(data.candidate);
    }
});
</script>

</body>
</html>
