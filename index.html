<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Mafia Game</title>

<style>
body { font-family: Arial; background:#111; color:white; text-align:center; }
.card { background:#222; padding:20px; border-radius:10px; margin:10px auto; width:300px; }
button { padding:10px; margin:5px; }
</style>
</head>

<body>

<div id="login" class="card">
<h2>🎮 لعبة المافيا</h2>

<p>
🔴 القوانين:<br>
- الليل: المافيا تقتل، الطبيب يحمي، المحقق يكشف<br>
- النهار: نقاش + تصويت<br>
</p>

<input id="name" placeholder="اسمك"><br>
<input id="room" placeholder="رقم الغرفة"><br>
<input id="pass" placeholder="كلمة السر"><br>

<button onclick="join()">دخول</button>
</div>

<div id="game" class="card" style="display:none;">
<h3 id="role"></h3>
<h3 id="phase"></h3>
<h2 id="timer"></h2>

<div id="players"></div>

<input id="target" placeholder="ID الهدف">
<button onclick="action()">تنفيذ</button>
<button onclick="vote()">تصويت</button>

<div id="log"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let room;

function join(){
    room = document.getElementById('room').value;

    socket.emit('join-room',{
        user: document.getElementById('name').value,
        room: room,
        pass: document.getElementById('pass').value
    });

    document.getElementById('login').style.display='none';
    document.getElementById('game').style.display='block';
}

socket.on('role', r=>{
    document.getElementById('role').innerText="دورك: "+r;
});

socket.on('phase', p=>{
    document.getElementById('phase').innerText="مرحلة: "+p;
});

socket.on('timer', t=>{
    document.getElementById('timer').innerText=t;
});

socket.on('players', p=>{
    document.getElementById('players').innerText=
        p.map(x=>x.name+(x.alive?"":"💀")).join("\n");
});

socket.on('msg', m=>{
    document.getElementById('log').innerHTML+=`<p>${m}</p>`;
});

socket.on('end', m=>{
    alert(m);
});

function action(){
    socket.emit('action',{
        room:room,
        target:document.getElementById('target').value
    });
}

function vote(){
    socket.emit('vote',{
        room:room,
        target:document.getElementById('target').value
    });
}
</script>

</body>
</html>
