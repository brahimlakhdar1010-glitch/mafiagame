<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MAFIA LAKHDAR | الإصدار الاحترافي</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .game-logo { font-size: 2.5rem; font-weight: 900; letter-spacing: 3px; background: linear-gradient(to bottom, #ff2e63, #881111); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 10px #e94560); margin-bottom: 20px; animation: glow 2s infinite alternate; }
        @keyframes glow { from { filter: drop-shadow(0 0 5px #e94560); } to { filter: drop-shadow(0 0 15px #ff2e63); } }
        #chatBox { width: 100%; max-width: 400px; height: 300px; background: #1e293b; overflow-y: auto; padding: 15px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 10px; }
        .player-card { background: #334155; padding: 10px; border-radius: 8px; margin: 5px; text-align: center; border-left: 4px solid #e94560; }
        .action-btn { background: #e94560; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        input { background: #1e293b; border: 1px solid #444; color: white; padding: 10px; border-radius: 6px; width: 280px; margin-bottom: 10px; }
        button#join-btn { background: #22c55e; color: white; border: none; padding: 10px 40px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="game-logo">MAFIA LAKHDAR</div>
        <input type="text" id="playerName" placeholder="اسمك">
        <input type="text" id="roomName" placeholder="رقم الغرفة">
        <input type="password" id="roomPass" placeholder="كلمة السر">
        <center><button id="join-btn" onclick="joinGame()">دخول المعركة</button></center>
    </div>

    <div id="game-screen" style="display:none; width: 100%; max-width: 450px;">
        <div id="status" style="color:#fbbf24; padding:10px; text-align:center;">انتظار اللاعبين...</div>
        <div id="role-display" style="text-align:center; font-size: 1.2rem; margin-bottom: 15px;"></div>
        <div id="player-list" style="display: flex; flex-wrap: wrap; justify-content: center;"></div>
        <div id="chatBox"></div>
        <div style="display:flex; gap:5px;">
            <input type="text" id="msgInput" style="flex:1;" placeholder="اكتب رسالة...">
            <button onclick="sendChat()" style="background:#e94560; color:white; border:none; border-radius:5px; width:60px;">إرسال</button>
        </div>
        <button id="mic-btn" onclick="toggleMic()" style="width:100%; margin-top:15px; background:#22c55e; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold;">🎤 الميكروفون: يعمل</button>
    </div>

    <script>
        const socket = io();
        let myStream, currentRoom, myRole, peers = {}, micEnabled = true;

        async function joinGame() {
            const name = document.getElementById('playerName').value;
            const room = document.getElementById('roomName').value;
            const pass = document.getElementById('roomPass').value;
            currentRoom = room;
            if (name && room) {
                try {
                    myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    socket.emit('joinRoom', { name, room, password: pass });
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('game-screen').style.display = 'block';
                    speak("مرحباً بك في مافيا لخدّر. استعد للقتال.");
                } catch (e) { alert("الميكروفون مطلوب!"); }
            }
        }

        socket.on('signal', d => {
            if (!peers[d.from]) {
                const p = new SimplePeer({ initiator: false, trickle: false, stream: myStream });
                p.on('signal', s => socket.emit('signal', { to: d.from, signal: s }));
                p.on('stream', s => { const a = new Audio(); a.srcObject = s; a.play(); });
                peers[d.from] = p;
            }
            peers[d.from].signal(d.signal);
        });

        socket.on('user-connected', uid => {
            const p = new SimplePeer({ initiator: true, trickle: false, stream: myStream });
            p.on('signal', s => socket.emit('signal', { to: uid, signal: s }));
            p.on('stream', s => { const a = new Audio(); a.srcObject = s; a.play(); });
            peers[uid] = p;
        });

        socket.on('phaseChange', data => {
            document.getElementById('status').innerText = data.msg;
            const list = document.getElementById('player-list');
            list.innerHTML = "";
            const me = data.players.find(p => p.id === socket.id);
            if (!me.isAlive) {
                if (micEnabled) toggleMic();
                document.getElementById('msgInput').disabled = true;
                document.getElementById('status').innerText = "💀 لقد تم إقصاؤك.. شاهد بصمت.";
                return;
            }
            data.players.forEach(p => {
                if (p.id !== socket.id && p.isAlive) {
                    const div = document.createElement('div');
                    div.className = "player-card";
                    div.innerHTML = `${p.name} <br> <button class="action-btn" onclick="act('${p.id}')">اختيار</button>`;
                    list.appendChild(div);
                }
            });
        });

        function act(tid) {
            const isNight = document.getElementById('status').innerText.includes("الليل");
            let type = isNight ? (myRole.includes("مافيا") ? "kill" : (myRole.includes("طبيب") ? "save" : "check")) : "vote";
            if (isNight) socket.emit('nightAction', { room: currentRoom, targetId: tid, type });
            else socket.emit('submitVote', { room: currentRoom, targetId: tid });
            document.getElementById('player-list').innerHTML = "<p>تم تنفيذ قرارك.</p>";
        }

        function toggleMic() {
            micEnabled = !micEnabled;
            myStream.getAudioTracks()[0].enabled = micEnabled;
            const btn = document.getElementById('mic-btn');
            btn.innerText = micEnabled ? "🎤 الميكروفون: يعمل" : "🔇 الميكروفون: مكتوم";
            btn.style.background = micEnabled ? "#22c55e" : "#ef4444";
        }

        socket.on('assignRole', r => { myRole = r; document.getElementById('role-display').innerText = "دورك: " + r; });
        socket.on('newMessage', d => {
            const div = document.createElement('div');
            div.innerHTML = `<b>${d.sender}:</b> ${d.text}`;
            const box = document.getElementById('chatBox');
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            if (d.sender === "النظام") speak(d.text);
        });

        function sendChat() {
            const inp = document.getElementById('msgInput');
            if (inp.value) { socket.emit('sendMessage', { room: currentRoom, text: inp.value }); inp.value = ""; }
        }

        function speak(t) {
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'ar-SA'; m.pitch = 0.5; m.rate = 0.85;
            window.speechSynthesis.speak(m);
        }
    </script>
</body>
</html>
