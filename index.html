<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<title>لعبة مافيا برو</title>
<style>
.dead { opacity: 0.5; pointer-events: none; text-decoration: line-through; }
#chat-box { height: 200px; overflow-y: auto; }
</style>
</head>

<body class="bg-gray-900 text-white p-4 text-right">
<div class="max-w-xl mx-auto text-center">

<h1 class="text-2xl font-bold mb-4">🎭 لعبة مافيا برو</h1>

<input id="username" placeholder="اسم المستخدم" class="p-2 text-black">
<input id="password" placeholder="كلمة المرور" class="p-2 text-black">

<br><br>

<button onclick="createRoom()" class="bg-blue-500 px-4 py-2">إنشاء غرفة</button>

<br><br>

<input id="roomId" placeholder="رقم الغرفة" class="p-2 text-black">
<button onclick="joinRoom()" class="bg-green-500 px-4 py-2">انضمام</button>

<hr class="my-4">

<h2>المرحلة: <span id="phase-text">الانتظار</span></h2>
<div id="my-role"></div>

<ul id="players-list"></ul>

<div id="chat-area" class="hidden">
<div id="chat-box"></div>
<input id="chat-input">
<button onclick="sendMessage()">إرسال</button>
</div>

<br>

<button onclick="startVoice()" class="bg-red-500 px-4 py-2">🎤 تشغيل الصوت</button>
<button onclick="stopVoice()" class="bg-gray-500 px-4 py-2">إيقاف</button>

<br><br>

<button onclick="startGame()" class="bg-purple-500 px-4 py-2">بدء</button>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();
let currentRoom, myId, myRole;

socket.on("connect", () => myId = socket.id);

function createRoom() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    socket.emit("createRoom", { username, password });
}

function joinRoom() {
    currentRoom = document.getElementById("roomId").value;
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    socket.emit("joinRoom", { roomId: currentRoom, username, password });
}

socket.on("roomCreated", (data) => {
    currentRoom = data.roomId;
    alert("رقم الغرفة: " + currentRoom);
});

socket.on("updatePlayers", (players) => {
    const list = document.getElementById("players-list");
    list.innerHTML = "";

    players.forEach(p => {
        const li = document.createElement("li");
        li.textContent = p.username;
        list.appendChild(li);
    });
});

socket.on("roleAssigned", (role) => {
    myRole = role;
    document.getElementById("my-role").textContent = role;
    document.getElementById("chat-area").classList.remove("hidden");
});

function startGame() {
    socket.emit("startGame", currentRoom);
}

function sendMessage() {
    const msg = document.getElementById("chat-input").value;
    socket.emit("chatMessage", { roomId: currentRoom, msg });
}

socket.on("receiveMessage", (data) => {
    const box = document.getElementById("chat-box");
    box.innerHTML += `<div>${data.user}: ${data.msg}</div>`;
});

socket.on("phaseUpdate", (phase) => {
    document.getElementById("phase-text").textContent = phase;
});


// ================= VOICE SYSTEM =================
let localStream;
let peers = {};

async function startVoice() {

    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

    socket.emit("voice-join", currentRoom);

    socket.on("voice-users", users => {
        users.forEach(userId => createPeer(userId, true));
    });

    socket.on("voice-offer", async (data) => {
        const peer = createPeer(data.from, false);
        await peer.setRemoteDescription(new RTCSessionDescription(data.offer));
        const answer = await peer.createAnswer();
        await peer.setLocalDescription(answer);

        socket.emit("voice-answer", {
            to: data.from,
            answer,
            roomId: currentRoom
        });
    });

    socket.on("voice-answer", async (data) => {
        await peers[data.from].setRemoteDescription(new RTCSessionDescription(data.answer));
    });

    socket.on("voice-ice", (data) => {
        peers[data.from].addIceCandidate(new RTCIceCandidate(data.candidate));
    });
}

function createPeer(userId, initiator) {
    const peer = new RTCPeerConnection();

    localStream.getTracks().forEach(track => peer.addTrack(track, localStream));

    peer.ontrack = (e) => {
        const audio = document.createElement("audio");
        audio.srcObject = e.streams[0];
        audio.autoplay = true;

        // ✅ الإصلاح الوحيد
        document.body.appendChild(audio);
    };

    peer.onicecandidate = (e) => {
        if (e.candidate) {
            socket.emit("voice-ice", {
                to: userId,
                candidate: e.candidate,
                roomId: currentRoom
            });
        }
    };

    if (initiator) {
        peer.createOffer().then(offer => {
            peer.setLocalDescription(offer);
            socket.emit("voice-offer", {
                to: userId,
                offer,
                roomId: currentRoom
            });
        });
    }

    peers[userId] = peer;
    return peer;
}

function stopVoice() {
    Object.values(peers).forEach(p => p.close());
    peers = {};

    if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
    }
}

</script>
</body>
</html>
