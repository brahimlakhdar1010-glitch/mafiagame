<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAFIALAKHDAR | العالمية</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f0f0f; color: white; margin: 0; padding: 10px; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; max-width: 500px; margin: auto; }
        .hidden { display: none; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #e74c3c; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .rules { font-size: 13px; color: #aaa; text-align: right; background: #222; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        #chat { height: 250px; overflow-y: auto; background: #000; padding: 10px; border-radius: 8px; margin: 10px 0; }
        .timer { font-size: 30px; color: #f1c40f; text-align: center; font-weight: bold; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-action { background: #34495e; font-size: 12px; }
        .night-mode { background: #0c0c20 !important; }
    </style>
</head>
<body>

<div id="login-screen" class="card">
    <h2>MAFIALAKHDAR 🕵️‍♂️</h2>
    <div class="rules">
        <b>طريقة الدخول والقوانين:</b><br>
        1. أدخل اسمك ورقم غرفة موحد مع أصدقائك وكلمة سر.<br>
        2. <b>المافيا:</b> يقتلون في الليل.<br>
        3. <b>الطبيب:</b> يحمي شخصاً واحداً.<br>
        4. <b>المحقق:</b> يكشف هوية لاعب واحد.<br>
        5. <b>النهار:</b> مناقشة صوتية وتصويت لإخراج المافيا.
    </div>
    <input type="text" id="user" placeholder="اسمك">
    <input type="text" id="room" placeholder="رقم الغرفة">
    <input type="password" id="pass" placeholder="كلمة السر">
    <button onclick="join()">دخول اللعبة</button>
</div>

<div id="game-area" class="card hidden">
    <div id="role-tag" style="color: #e74c3c; font-weight: bold;">انتظار اللاعبين...</div>
    <div id="timer" class="timer">00:30</div>
    <div id="chat"></div>
    <div id="actions" class="action-grid"></div>
    <hr>
    <div style="display: flex; gap: 5px;">
        <input type="text" id="msg" placeholder="اكتب هنا...">
        <button onclick="sendMsg()" style="width: 80px;">إرسال</button>
    </div>
    <button id="mic-btn" onclick="toggleMic()" style="background: #27ae60; margin-top: 10px;">🎤 ميكروفون: مغلق</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let myRoom, myRole, isAlive = true, micActive = false;
    const roleAr = { mafia: 'مافيا 👺', doctor: 'طبيب 🩺', detective: 'محقق 🔍', citizen: 'مواطن 👤' };

    function join() {
        const data = { user: document.getElementById('user').value, room: document.getElementById('room').value, pass: document.getElementById('pass').value };
        myRoom = data.room;
        socket.emit('join-room', data);
    }

    socket.on('joined', () => {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('game-area').classList.remove('hidden');
    });

    socket.on('your-role', (role) => {
        myRole = role;
        document.getElementById('role-tag').innerText = "دورك: " + roleAr[role];
    });

    socket.on('time-update', (t) => {
        document.getElementById('timer').innerText = t;
    });

    socket.on('sys-msg', (m) => {
        const c = document.getElementById('chat');
        c.innerHTML += `<p style="color: #27ae60">📢 ${m}</p>`;
        c.scrollTop = c.scrollHeight;
    });

    socket.on('chat-msg', (d) => {
        const c = document.getElementById('chat');
        c.innerHTML += `<p><b>${d.user}:</b> ${d.msg}</p>`;
        c.scrollTop = c.scrollHeight;
    });

    socket.on('phase-change', (data) => {
        const area = document.getElementById('actions');
        area.innerHTML = "";
        
        // إظهار الأزرار للأدوار في الليل، وللجميع في النهار
        if (isAlive) {
            data.players.forEach(p => {
                if (p.id !== socket.id) {
                    const btn = document.createElement('button');
                    btn.className = "btn-action";
                    btn.innerText = (data.phase === 'night' ? "استخدام القدرة على " : "تصويت ضد ") + p.name;
                    btn.onclick = () => {
                        socket.emit('action', { room: myRoom, target: p.id });
                        area.innerHTML = "تم الاختيار!";
                    };
                    area.appendChild(btn);
                }
            });
        }
    });

    // نظام الميكروفون
    async function toggleMic() {
        if (!isAlive) return;
        micActive = !micActive;
        const btn = document.getElementById('mic-btn');
        btn.innerText = micActive ? "🎤 ميكروفون: يعمل" : "🎤 ميكروفون: مغلق";
        btn.style.background = micActive ? "#e67e22" : "#27ae60";

        if (micActive) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = (e) => {
                socket.emit('voice-data', { room: myRoom, stream: e.data });
            };
            mediaRecorder.start(500); // إرسال بيانات كل نصف ثانية
            window.myStream = mediaRecorder;
        } else {
            window.myStream.stop();
        }
    }

    socket.on('audio-stream', (data) => {
        const blob = new Blob([data.stream], { type: 'audio/webm' });
        const url = window.URL.createObjectURL(blob);
        new Audio(url).play();
    });

    function sendMsg() {
        const m = document.getElementById('msg');
        if (m.value && isAlive) {
            socket.emit('send-chat', { room: myRoom, msg: m.value });
            m.value = "";
        }
    }
</script>
</body>
</html>
