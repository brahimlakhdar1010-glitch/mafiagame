<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Mafia Voice Pro</title>
</head>
<body>

<input id="user" placeholder="اسمك">
<input id="room" placeholder="الغرفة">
<input id="pass" placeholder="كلمة السر">
<button onclick="join()">دخول</button>

<br><br>

<button id="mic-btn" onclick="toggleMic()">🎤 تشغيل</button>
<button onclick="toggleMute()">🔇 كتم</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let myRoom;
let localStream;
let peerConnections = {};
let micActive = false;

let currentPhase = "waiting";
let myRole = null;
let isAlive = true;
let isMuted = false;

// ✅ التعديل هنا فقط (إضافة TURN)
const config = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" },
        {
            urls: "turn:openrelay.metered.ca:80",
            username: "openrelayproject",
            credential: "openrelayproject"
        }
    ]
};

function join() {
    myRoom = document.getElementById('room').value;
    socket.emit('join-room', {
        user: document.getElementById('user').value,
        room: myRoom,
        pass: document.getElementById('pass').value
    });
}

socket.on('your-role', (role) => {
    myRole = role;
});

socket.on('phase-change', (data) => {
    currentPhase = data.phase;

    if (micActive) stopMic();
});

function canSpeak() {
    if (!isAlive) return false;
    if (isMuted) return false;
    if (currentPhase === "night" && myRole !== "mafia") return false;
    return true;
}

async function toggleMic() {
    if (!canSpeak()) {
        alert("لا يمكنك التحدث الآن");
        return;
    }

    if (!micActive) {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

        socket.emit('ready', { room: myRoom });

        micActive = true;
        document.getElementById('mic-btn').innerText = "🎤 يعمل";
    } else {
        stopMic();
    }
}

function stopMic() {
    if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
    }
    Object.values(peerConnections).forEach(pc => pc.close());
    peerConnections = {};
    micActive = false;
    document.getElementById('mic-btn').innerText = "🎤 مغلق";
}

function toggleMute() {
    isMuted = !isMuted;
    socket.emit('toggle-mute', { room: myRoom });
    alert(isMuted ? "تم الكتم" : "تم فتح الصوت");
}

// WebRTC
socket.on('ready', async (data) => {
    const pc = new RTCPeerConnection(config);
    peerConnections[data.from] = pc;

    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    pc.ontrack = (e) => {
        const audio = new Audio();
        audio.srcObject = e.streams[0];
        audio.autoplay = true;        // ✅ إضافة مهمة
        audio.playsInline = true;     // ✅ إضافة مهمة
        audio.play();
    };

    pc.onicecandidate = (e) => {
        if (e.candidate) {
            socket.emit('ice-candidate', { room: myRoom, candidate: e.candidate });
        }
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    socket.emit('offer', { room: myRoom, offer });
});

socket.on('offer', async (data) => {
    const pc = new RTCPeerConnection(config);
    peerConnections[data.from] = pc;

    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    pc.ontrack = (e) => {
        const audio = new Audio();
        audio.srcObject = e.streams[0];
        audio.autoplay = true;        // ✅ إضافة مهمة
        audio.playsInline = true;     // ✅ إضافة مهمة
        audio.play();
    };

    pc.onicecandidate = (e) => {
        if (e.candidate) {
            socket.emit('ice-candidate', { room: myRoom, candidate: e.candidate });
        }
    };

    await pc.setRemoteDescription(data.offer);

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    socket.emit('answer', { room: myRoom, answer });
});

socket.on('answer', async (data) => {
    const pc = peerConnections[data.from];
    if (pc) await pc.setRemoteDescription(data.answer);
});

socket.on('ice-candidate', async (data) => {
    const pc = peerConnections[data.from];
    if (pc && data.candidate) await pc.addIceCandidate(data.candidate);
});
</script>

</body>
</html>
