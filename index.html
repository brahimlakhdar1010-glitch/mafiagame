<!DOCTYPE html>
<html dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <script src="https://cdn.tailwindcss.com"></script>
<title>لعبة مافيا برو</title>
<style>
/* ===== تحسين عام ===== */
body {
    font-family: 'Tajawal', sans-serif;
    background: radial-gradient(circle at 20% 20%, #0f172a, #020617 70%);
    color: #e2e8f0;
}


/* ===== بطاقات ===== */
.card {
    background: rgba(30, 41, 59, 0.8);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(71, 85, 105, 0.3);
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

/* ===== اللاعبين ===== */
#players-list li {
    transition: all 0.3s ease;
    border-radius: 12px;
}

#players-list li:hover {
    transform: scale(1.02);
    background: rgba(59,130,246,0.2);
}

/* ===== أزرار ===== */
button {
    transition: all 0.2s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

button:active {
    transform: scale(0.95);
}

/* ===== المؤقت ===== */
#timer-display {
    background: linear-gradient(145deg, #000, #111);
    border-radius: 20px;
    border: 2px solid #ef4444;
    box-shadow: inset 0 0 20px rgba(255,0,0,0.3);
    letter-spacing: 3px;
}

/* ===== شريط الأخبار ===== */
#news-bar {
    animation: fadeIn 0.10s ease;
    background: linear-gradient(90deg, #1e3a8a, #1d4ed8);
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px);}
    to { opacity: 1; transform: translateY(0);}
}

/* ===== الدردشة ===== */
#chat-box {
    height: 200px;
    overflow-y: auto;
    scrollbar-width: thin;
}

#chat-box::-webkit-scrollbar {
    width: 5px;
}

#chat-box::-webkit-scrollbar-thumb {
    background: #3b82f6;
    border-radius: 10px;
}

/* ===== رسائل صوت ===== */
.voice-message {
    background: linear-gradient(145deg, #1e293b, #0f172a);
    border: 1px solid rgba(59,130,246,0.3);
    padding: 10px;
    border-radius: 10px;
}

/* ===== المايك ===== */
#mic-btn {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 3px solid #4ade80;
    background: radial-gradient(circle, #2563eb, #1e3a8a);
    font-size: 30px;
}

#mic-btn.recording {
    background: radial-gradient(circle, #dc2626, #7f1d1d);
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.7);}
    70% { box-shadow: 0 0 0 20px rgba(239,68,68,0);}
    100% { box-shadow: 0 0 0 0 rgba(239,68,68,0);}
}

/* ===== الصوت ===== */
#volume-indicator {
    width: 150px;
    height: 12px;
    background: #111827;
    border-radius: 20px;
    overflow: hidden;
}

#volume-bar {
    height: 100%;
    background: linear-gradient(90deg, #22c55e, #eab308, #ef4444);
}

/* ===== اللاعب الميت ===== */
.dead {
    opacity: 0.4;
    filter: grayscale(100%);
    text-decoration: line-through;
}

/* ===== عنوان ===== */
h1 {
    text-shadow: 0 0 15px rgba(59,130,246,0.6);
}

    
    @keyframes pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
        50% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
    }
    
    #volume-indicator {
        width: 120px;
        height: 10px;
        background: #374151;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid #4b5563;
    }
    
    #volume-bar {
        height: 100%;
        background: linear-gradient(90deg, #22c55e, #eab308, #ef4444);
        width: 0%;
        transition: width 0.1s;
    }
    
    .voice-status {
        font-size: 12px;
        color: #60a5fa;
        text-align: center;
        width: 100%;
    }

    .voice-message {
        background: #1e293b;
        padding: 10px;
        border-radius: 8px;
        margin: 5px 0;
        border-right: 3px solid #3b82f6;
    }

    .voice-message audio {
        width: 100%;
        height: 32px;
        margin-top: 5px;
    }
</style>
</head>
<body class="bg-gray-900 text-white p-4 md:p-6 text-right">
    <div id="splash-screen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:black;z-index:9999;display:flex;justify-content:center;align-items:center;">
   <img src="mafia.jpg" style="
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  max-width:100%;
  max-height:100%;
">
     </div>   
    <div id="loading" class="hidden">جارٍ تحميل اللعبة...
    </div>
<div id="game-content" class="hidden">
    <div class="max-w-xl mx-auto text-center card p-4">
    
    <h1 class="text-2xl md:text-3xl font-bold mb-4 bg-gradient-to-r from-blue-500 to-green-400 text-transparent bg-clip-text">
🎭 Mafia Pro | Lakhdar
</h1>
    <div id="timer-display" class="hidden text-3xl md:text-4xl font-mono text-red-500 mb-4 bg-black p-2 rounded shadow-lg border-2 border-red-900">00:00</div>
    <div id="news-bar" class="bg-blue-900 p-2 my-2 rounded hidden italic text-sm md:text-base"></div>
<div id="setup-area" class="space-y-2">
    <input id="username" class="w-full md:w-auto p-2 text-black text-right rounded" placeholder="اسم المستخدم" />
    <input id="password" class="w-full md:w-auto p-2 text-black text-right rounded" placeholder="كلمة المرور" />
    <br>

    <button onclick="createRoom()" class="bg-blue-500 w-full md:w-auto px-4 py-2 rounded font-bold">
        إنشاء غرفة
    </button>

    <!-- ✅ هنا تضيف زر المشاركة -->
    <button onclick="shareGame()" class="bg-indigo-500 w-full md:w-auto px-4 py-2 rounded font-bold">
        🔗 مشاركة اللعبة
    </button>

    <div class="py-2 text-gray-500">أو</div>

    <input id="roomId" class="w-full md:w-auto p-2 text-black text-right rounded" placeholder="رقم الغرفة" />
    <button onclick="joinRoom()" class="bg-green-500 w-full md:w-auto px-4 py-2 rounded font-bold">
        انضمام للغرفة
    </button>
    
</div>

    <hr class="my-4 border-gray-700">
    <h2 class="text-lg md:text-xl">المرحلة الحالية: <span id="phase-text" class="text-blue-400">الانتظار</span></h2>
    <div id="mafia-count-display" class="text-red-400 font-bold mt-1 hidden"></div>
    <div id="my-role" class="text-xl md:text-2xl font-bold text-yellow-400 my-2"></div>
    
    <div id="game-board" class="mt-4">
        <h3 class="font-bold mb-2">قائمة اللاعبين:</h3>
        <ul id="players-list" class="space-y-2 text-right"></ul>
    </div>
<div id="votes-log" class="text-xs mt-2 bg-gray-900 p-2 rounded"></div>
    <!-- قسم الصوت -->
    <div id="voice-setup" class="hidden mt-6 bg-gray-800 rounded p-4">
        <h3 class="font-bold mb-3 border-b border-gray-700 pb-1">🎤 نظام التحدث الصوتي</h3>
        <div class="voice-container">
            <button id="mic-btn" title="اضغط وتحدث - Press to Talk">🎤</button>
            <div id="volume-indicator">
                <div id="volume-bar"></div>
            </div>
        </div>
        <div class="voice-status">
            <div id="voice-status-text">✅ جاهز للتحدث</div>
        </div>
    </div>

    <div id="chat-area" class="mt-6 bg-gray-800 rounded p-4 text-right hidden">
        <h3 class="font-bold mb-2 border-b border-gray-700 pb-1 text-sm">الدردشة العامة 💬</h3>
        <div id="chat-box" class="text-sm space-y-1 mb-2 bg-gray-900 p-2 rounded"></div>
        <div class="flex gap-2">
            <input id="chat-input" type="text" class="flex-1 p-2 rounded text-black text-sm" placeholder="اكتب..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" class="bg-blue-600 px-3 py-1 rounded text-sm">إرسال</button>
               </div>
        <div id="mafia-chat" class="mt-4 bg-red-900 p-3 rounded hidden">
    <h3 class="font-bold text-sm mb-2">💀 دردشة المافيا</h3>
    <div id="mafia-box" class="text-xs h-24 overflow-y-auto mb-2"></div>
    <input id="mafia-input" type="text" class="w-full p-1 text-black text-xs"
        placeholder="رسالة للمافيا..."
        onkeypress="if(event.key==='Enter') sendMafiaMessage()">
</div>
    </div>

    <div id="controls" class="mt-4 flex flex-col gap-2 hidden">
        <input id="mafia-count" type="number" min="1" value="1"
class="w-full p-2 text-black rounded"
placeholder="عدد المافيا">
        <button id="start-btn" onclick="startGame()" class="bg-purple-500 w-full py-2 rounded font-bold">بدء اللعبة</button>
        <button id="end-day-btn" onclick="endDay()" class="bg-yellow-600 w-full py-2 rounded hidden font-bold">إنهاء التصويت مبكراً</button>
    </div>
</div>
<script>
const socket = io();

/* ================== STATE ================== */
let state = {
    room: null,
    id: null,
    role: null,
    dead: false,
    phase: "lobby",
    votes: {},
    voteDetails: {},
    peerConnections: {},
    localStream: null
};

/* ================== SOCKET INIT ================== */
socket.on("connect", () => state.id = socket.id);

socket.on("joinError", alert);

socket.on("roomCreated", d => {
    state.room = d.roomId;
    alert("غرفة رقم: " + d.roomId);
    initAudio();
});

/* ================== JOIN ================== */
socket.on("joinedRoomSuccess", (data) => {
    state.room = data.roomId;

    document.getElementById("setup-area").classList.add("hidden");
    document.getElementById("chat-area").classList.remove("hidden");
    document.getElementById("voice-setup").classList.remove("hidden");

    initAudio();
    startVoice();
});

/* ================== ROLE ================== */
socket.on("roleAssigned", role => {
    state.role = role;

    const roles = {
        mafia: "مافيا 👿",
        doctor: "طبيب 👨‍⚕️",
        police: "شرطي 👮",
        citizen: "مواطن 👤"
    };

    document.getElementById("my-role").textContent = "دورك: " + roles[role];

    document.getElementById("setup-area").classList.add("hidden");
    document.getElementById("controls").classList.remove("hidden");
    document.getElementById("chat-area").classList.remove("hidden");
});

/* ================== PHASE ================== */
socket.on("phaseUpdate", phase => {
    state.phase = phase;

    const map = {
        lobby: "الانتظار",
        night: "الليل 🌙",
        day: "النهار ☀️"
    };

    document.getElementById("phase-text").textContent = map[phase];
});

/* ================== PLAYERS ================== */
socket.on("updatePlayers", players => {
    const list = document.getElementById("players-list");
    list.innerHTML = "";

    players.forEach(p => {
        const li = document.createElement("li");

        const votes = state.votes[p.id] || 0;

        li.innerHTML = `
            <span>${p.username} ${votes ? `(${votes})` : ""} ${p.dead ? "☠" : ""}</span>
        `;

        list.appendChild(li);
    });

    // 🔥 WebRTC (مرة وحدة لكل لاعب)
    players.forEach(p => {
        if (p.id !== state.id && !state.peerConnections[p.id]) {
            createPeer(p.id);
        }
    });
});

/* ================== CHAT ================== */
socket.on("receiveMessage", data => {
    const box = document.getElementById("chat-box");

    const div = document.createElement("div");
    div.innerHTML = `<b>${data.user}:</b> ${data.msg}`;

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
});

/* ================== VOTES ================== */
socket.on("voteUpdate", data => {
    state.votes = data.tally || {};
    state.voteDetails = data.detailedVotes || {};
});

/* ================== AUDIO ================== */
let mediaRecorder, chunks = [];

async function initAudio() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        mediaRecorder = new MediaRecorder(stream);

        mediaRecorder.ondataavailable = e => chunks.push(e.data);

        mediaRecorder.onstop = () => {
            const blob = new Blob(chunks);
            chunks = [];

            const reader = new FileReader();
            reader.onload = () => {
                socket.emit("voiceMessage", {
                    roomId: state.room,
                    audioData: reader.result
                });
            };
            reader.readAsArrayBuffer(blob);
        };

    } catch {
        alert("❌ الميكروفون مرفوض");
    }
}

/* ================== RECORD ================== */
function startRecording() {
    if (!mediaRecorder || state.dead) return;
    chunks = [];
    mediaRecorder.start();
}

function stopRecording() {
    if (mediaRecorder) mediaRecorder.stop();
}

/* ================== WEBRTC ================== */
async function startVoice() {
    state.localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    socket.emit("joinVoice", { roomId: state.room });
}

async function createPeer(id) {
    const pc = new RTCPeerConnection();
    state.peerConnections[id] = pc;

    state.localStream.getTracks().forEach(t => pc.addTrack(t, state.localStream));

    pc.ontrack = e => {
        const audio = document.createElement("audio");
        audio.srcObject = e.streams[0];
        audio.autoplay = true;
        document.body.appendChild(audio);
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    socket.emit("webrtc-offer", {
        roomId: state.room,
        offer
    });
}

socket.on("webrtc-offer", async ({ offer, from }) => {
    const pc = new RTCPeerConnection();
    state.peerConnections[from] = pc;

    state.localStream.getTracks().forEach(t => pc.addTrack(t, state.localStream));

    await pc.setRemoteDescription(offer);

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    socket.emit("webrtc-answer", {
        roomId: state.room,
        answer
    });
});

socket.on("webrtc-answer", async ({ answer, from }) => {
    await state.peerConnections[from]?.setRemoteDescription(answer);
});

/* ================== ACTIONS ================== */
function createRoom() {
    const user = document.getElementById("username").value;
    if (!user) return alert("ادخل اسمك");

    socket.emit("createRoom", { username: user });
}

function joinRoom() {
    const roomId = document.getElementById("roomId").value;
    const username = document.getElementById("username").value;

    if (!roomId || !username) return alert("❌ بيانات ناقصة");

    state.room = roomId;

    socket.emit("joinRoom", {
        roomId,
        username
    });
}

function sendMessage() {
    const input = document.getElementById("chat-input");
    const msg = input.value.trim();

    if (!msg) return;

    socket.emit("chatMessage", {
        roomId: state.room,
        msg
    });

    input.value = "";
}
</script>

</div>
</div>        
</body>
</html>
