<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MAFIA LAKHDAR | ULTIMATE</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        body { 
            background: radial-gradient(circle at center, #1a1c2c 0%, #070b14 100%);
            color: #e2e8f0; font-family: 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; margin: 0; padding: 20px;
        }
        .logo { font-size: 3rem; font-weight: 900; background: linear-gradient(to bottom, #ff2e63, #5a0000); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 15px #ff2e63); margin-bottom: 10px; animation: pulse 2s infinite alternate; }
        @keyframes pulse { from { opacity: 0.8; } to { opacity: 1; filter: drop-shadow(0 0 20px #ff2e63); } }
        
        #timer-box {
            width: 90px; height: 90px; border: 4px solid #ff2e63;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: bold; margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255, 46, 99, 0.4); background: rgba(0,0,0,0.6);
        }

        #chatBox { width: 100%; max-width: 450px; height: 350px; background: rgba(22, 27, 34, 0.8); border: 1px solid #30363d; border-radius: 15px; overflow-y: auto; padding: 15px; margin-bottom: 10px; backdrop-filter: blur(8px); }
        .p-card { background: rgba(33, 38, 45, 0.9); border-bottom: 3px solid #ff2e63; padding: 12px; border-radius: 10px; margin: 8px; text-align: center; min-width: 110px; }
        .btn-act { background: #ff2e63; color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; margin-top: 8px; }
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 25px; width: 280px; text-align: center; margin-bottom: 15px; }
        button#joinBtn { background: #238636; color: white; border: none; padding: 14px 70px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="logo">MAFIA LAKHDAR</div>
        <input type="text" id="pName" placeholder="اسمك المستعار"><br>
        <input type="text" id="rName" placeholder="رقم الغرفة"><br>
        <input type="password" id="rPass" placeholder="كلمة السر"><br>
        <center><button id="joinBtn" onclick="join()">ابدأ المهمة</button></center>
    </div>

    <div id="game-screen" style="display:none; width: 100%; max-width: 500px;">
        <div id="timer-box">--</div>
        <div id="status" style="color:#f0e050; text-align:center; font-weight:bold; margin-bottom:15px;"></div>
        <div id="role" style="text-align:center; font-size:1.4rem; margin-bottom:15px; color:#ff2e63;"></div>
        <div id="player-list" style="display:flex; flex-wrap:wrap; justify-content:center; margin-bottom:15px;"></div>
        <div id="chatBox"></div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="mInput" style="flex:1; margin-bottom:0;" placeholder="تحدث مع الأحياء...">
            <button onclick="send()" style="background:#ff2e63; border:none; padding:10px 20px; border-radius:10px; color:white; cursor:pointer;">📩</button>
        </div>
        <button id="micBtn" onclick="toggleMic()" style="width:100%; margin-top:20px; background:#238636; color:white; border:none; padding:15px; border-radius:12px; font-weight:bold; cursor:pointer;">🎤 الميكروفون: مفعّل</button>
    </div>

    <script>
        const socket = io();
        let stream, room, myRole, peers = {}, micOn = true;

        const iceConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] };

        async function join() {
            const name = document.getElementById('pName').value;
            room = document.getElementById('rName').value;
            const pass = document.getElementById('rPass').value;
            if (name && room) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    // تفعيل السياق الصوتي لضمان سماع الآخرين
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    
                    socket.emit('joinRoom', { name, room, password: pass });
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('game-screen').style.display = 'block';
                    speak("أهلاً بك في مافيا لخدّر. استعد!");
                } catch(e) { alert("الميكروفون مطلوب!"); }
            }
        }

        socket.on('timerUpdate', t => {
            const box = document.getElementById('timer-box');
            box.innerText = t;
            box.style.color = t <= 10 ? "#ff2e63" : "white";
        });

        socket.on('signal', d => {
            if (!peers[d.from]) {
                const p = new SimplePeer({ initiator: false, trickle: false, stream: stream, config: iceConfig });
                p.on('signal', s => socket.emit('signal', { to: d.from, signal: s }));
                p.on('stream', st => { const a = new Audio(); a.srcObject = st; a.play(); });
                peers[d.from] = p;
            }
            peers[d.from].signal(d.signal);
        });

        socket.on('user-connected', id => {
            if (id === socket.id) return;
            const p = new SimplePeer({ initiator: true, trickle: false, stream: stream, config: iceConfig });
            p.on('signal', s => socket.emit('signal', { to: id, signal: s }));
            p.on('stream', st => { const a = new Audio(); a.srcObject = st; a.play(); });
            peers[id] = p;
        });

        socket.on('phaseChange', d => {
            document.getElementById('status').innerText = d.msg;
            const list = document.getElementById('player-list'); list.innerHTML = "";
            const me = d.players.find(p => p.id === socket.id);
            const isNight = d.phase === "night";

            if (!me.isAlive) {
                if (micOn) toggleMic();
                document.getElementById('mInput').disabled = true;
                document.getElementById('status').innerText = "💀 مقتول (لا يمكنك المشاركة)";
                return;
            }

            d.players.forEach(p => {
                if (p.id !== socket.id && p.isAlive) {
                    const div = document.createElement('div'); div.className = "p-card";
                    div.innerHTML = `${p.name}<br>`;
                    let canAct = !isNight || (myRole.includes("مافيا") || myRole.includes("طبيب") || myRole.includes("شرطة"));
                    if (canAct) div.innerHTML += `<button class="btn-act" onclick="act('${p.id}')">اختيار</button>`;
                    list.appendChild(div);
                }
            });
        });

        function act(tid) {
            const isNight = document.getElementById('status').innerText.includes("الليل");
            if (isNight) {
                let type = myRole.includes("مافيا") ? "kill" : (myRole.includes("طبيب") ? "save" : (myRole.includes("شرطة") ? "check" : ""));
                if (type) socket.emit('nightAction', { room, targetId: tid, type });
            } else {
                socket.emit('submitVote', { room, targetId: tid });
            }
            document.getElementById('player-list').innerHTML = "<p>✅ تم التأكيد</p>";
        }

        socket.on('assignRole', r => { myRole = r; document.getElementById('role').innerText = "دورك: " + r; });
        socket.on('newMessage', d => {
            const div = document.createElement('div');
            div.innerHTML = `<b style="color:#ff2e63">${d.sender}:</b> ${d.text}`;
            const box = document.getElementById('chatBox'); box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            if (d.sender === "النظام") speak(d.text);
        });

        function toggleMic() {
            micOn = !micOn; stream.getAudioTracks()[0].enabled = micOn;
            const btn = document.getElementById('micBtn');
            btn.innerText = micOn ? "🎤 الميكروفون: مفعّل" : "🔇 الميكروفون: مكتوم";
            btn.style.background = micOn ? "#238636" : "#7a0000";
        }

        function send() {
            const inp = document.getElementById('mInput');
            if (inp.value) { socket.emit('sendMessage', { room, text: inp.value }); inp.value = ""; }
        }

        function speak(t) {
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'ar-SA'; m.pitch = 0.5; m.rate = 0.9;
            window.speechSynthesis.speak(m);
        }
    </script>
</body>
</html>
