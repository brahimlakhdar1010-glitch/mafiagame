<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Mafia Pro Voice</title>
</head>
<body>

<input id="user" placeholder="اسمك">
<input id="room" placeholder="الغرفة">
<input id="pass" placeholder="كلمة السر">
<button onclick="join()">دخول</button>

<br><br>

<button id="talk-btn">🎤 اضغط وتكلم</button>
<button onclick="toggleMute()">🔇 كتم</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let myRoom;
let localStream;
let peerConnections = {};

let myRole = null;
let currentPhase = "waiting";
let isAlive = true;
let isMuted = false;
let talking = false;

const config = {
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

function join() {
    myRoom = document.getElementById('room').value;
    socket.emit('join-room', {
        user: document.getElementById('user').value,
        room: myRoom,
        pass: document.getElementById('pass').value
    });
}

socket.on('your-role', (role) => {
    myRole = role;
});

socket.on('phase-change', (data) => {
    currentPhase = data.phase;
    stopVoice();
});

function canSpeak() {
    if (!isAlive) return false;
    if (isMuted) return false;

    if (currentPhase === "night" && myRole !== "mafia")
        return false;

    return true;
}

// 🎤 Push To Talk
const btn = document.getElementById('talk-btn');

btn.onmousedown = startTalking;
btn.onmouseup = stopVoice;
btn.ontouchstart = startTalking;
btn.ontouchend = stopVoice;

async function startTalking() {
    if (talking) return;
    if (!canSpeak()) return alert("لا يمكنك التحدث الآن");

    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

    socket.emit('ready', { room: myRoom });

    talking = true;
    btn.innerText = "🔴 تتكلم...";
}

function stopVoice() {
    if (!talking) return;

    if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
    }

    Object.values(peerConnections).forEach(pc => pc.close());
    peerConnections = {};

    talking = false;
    btn.innerText = "🎤 اضغط وتكلم";
}

// 🔇 Mute
function toggleMute() {
    isMuted = !isMuted;
    alert(isMuted ? "🔇 مكتوم" : "🔊 مسموع");
}

// 🎧 WebRTC
socket.on('ready', async (data) => {
    if (currentPhase === "night" && myRole !== "mafia") return;

    const pc = new RTCPeerConnection(config);
    peerConnections[data.from] = pc;

    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    pc.ontrack = (e) => {
        // 🌙 فلترة: غير المافيا في الليل
        if (currentPhase === "night" && myRole !== "mafia") return;

        const audio = new Audio();
        audio.srcObject = e.streams[0];
        audio.play();
    };

    pc.onicecandidate = (e) => {
        if (e.candidate) {
            socket.emit('ice-candidate', { room: myRoom, candidate: e.candidate });
        }
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    socket.emit('offer', { room: myRoom, offer });
});

socket.on('offer', async (data) => {
    if (currentPhase === "night" && myRole !== "mafia") return;

    const pc = new RTCPeerConnection(config);
    peerConnections[data.from] = pc;

    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    pc.ontrack = (e) => {
        if (currentPhase === "night" && myRole !== "mafia") return;

        const audio = new Audio();
        audio.srcObject = e.streams[0];
        audio.play();
    };

    pc.onicecandidate = (e) => {
        if (e.candidate) {
            socket.emit('ice-candidate', { room: myRoom, candidate: e.candidate });
        }
    };

    await pc.setRemoteDescription(data.offer);

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    socket.emit('answer', { room: myRoom, answer });
});

socket.on('answer', async (data) => {
    const pc = peerConnections[data.from];
    if (pc) await pc.setRemoteDescription(data.answer);
});

socket.on('ice-candidate', async (data) => {
    const pc = peerConnections[data.from];
    if (pc && data.candidate) await pc.addIceCandidate(data.candidate);
});
</script>

</body>
</html>
