<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MAFIA LAKHDAR | PRO</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        body { background: #0b0f19; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 15px; margin: 0; }
        .logo { font-size: 2.8rem; font-weight: 900; background: linear-gradient(to bottom, #ff3e3e, #7a0000); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 8px #ff0000); margin: 20px 0; animation: pulse 2s infinite alternate; }
        @keyframes pulse { from { opacity: 0.8; } to { opacity: 1; filter: drop-shadow(0 0 15px #ff0000); } }
        #chatBox { width: 100%; max-width: 420px; height: 350px; background: #161b22; border: 1px solid #30363d; border-radius: 12px; overflow-y: auto; padding: 12px; margin-bottom: 10px; }
        .p-card { background: #21262d; border-left: 5px solid #ff3e3e; padding: 10px; border-radius: 8px; margin: 6px; text-align: center; display: inline-block; min-width: 100px; }
        .btn-act { background: #ff3e3e; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 8px; width: 300px; margin-bottom: 10px; }
        button#joinBtn { background: #238636; color: white; border: none; padding: 12px 50px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="logo">MAFIA LAKHDAR</div>
        <input type="text" id="pName" placeholder="اسمك المستعار">
        <input type="text" id="rName" placeholder="رقم الغرفة">
        <input type="password" id="rPass" placeholder="كلمة السر">
        <center><button id="joinBtn" onclick="join()">ابدأ المعركة</button></center>
    </div>

    <div id="game-screen" style="display:none; width: 100%; max-width: 450px;">
        <div id="status" style="color:#f0e050; text-align:center; font-weight:bold; margin-bottom:10px;"></div>
        <div id="role" style="text-align:center; font-size:1.3rem; margin-bottom:15px; color:#ff3e3e;"></div>
        <div id="player-list" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>
        <div id="chatBox"></div>
        <div style="display:flex; gap:8px;">
            <input type="text" id="mInput" style="flex:1;" placeholder="أرسل رسالة للأحياء...">
            <button onclick="send()" style="background:#ff3e3e; border:none; padding:10px; border-radius:8px; color:white;">📩</button>
        </div>
        <button id="micBtn" onclick="toggleMic()" style="width:100%; margin-top:15px; background:#238636; color:white; border:none; padding:14px; border-radius:10px; font-weight:bold;">🎤 الميكروفون: مفعّل</button>
    </div>

    <script>
        const socket = io();
        let stream, room, myRole, peers = {}, micOn = true;

        async function join() {
            const name = document.getElementById('pName').value;
            room = document.getElementById('rName').value;
            const pass = document.getElementById('rPass').value;
            if (name && room) {
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    socket.emit('joinRoom', { name, room, password: pass });
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('game-screen').style.display = 'block';
                    speak("أهلاً بك في مافيا لخدّر. القوانين صارمة، ابقَ حذراً.");
                } catch(e) { alert("الميكروفون ضروري للتواصل!"); }
            }
        }

        socket.on('signal', d => {
            if (!peers[d.from]) {
                const p = new SimplePeer({ initiator: false, trickle: false, stream: stream });
                p.on('signal', s => socket.emit('signal', { to: d.from, signal: s }));
                p.on('stream', st => { const a = new Audio(); a.srcObject = st; a.play(); });
                peers[d.from] = p;
            }
            peers[d.from].signal(d.signal);
        });

        socket.on('user-connected', id => {
            const p = new SimplePeer({ initiator: true, trickle: false, stream: stream });
            p.on('signal', s => socket.emit('signal', { to: id, signal: s }));
            p.on('stream', st => { const a = new Audio(); a.srcObject = st; a.play(); });
            peers[id] = p;
        });

        socket.on('phaseChange', d => {
            document.getElementById('status').innerText = d.msg;
            const list = document.getElementById('player-list'); list.innerHTML = "";
            const me = d.players.find(p => p.id === socket.id);
            const isNight = d.msg.includes("الليل");

            if (!me.isAlive) {
                if (micOn) toggleMic();
                document.getElementById('mInput').disabled = true;
                document.getElementById('status').innerText = "💀 مقتول (لا يمكنك الكلام أو التصويت)";
                return;
            }

            d.players.forEach(p => {
                if (p.id !== socket.id && p.isAlive) {
                    const div = document.createElement('div'); div.className = "p-card";
                    div.innerHTML = `${p.name}<br>`;
                    
                    // تعديل: إظهار الأزرار للمواطنين في النهار فقط، وللأدوار الخاصة في الليل
                    let showBtn = false;
                    if (!isNight) showBtn = true; // الجميع يصوت بالنهار
                    else {
                        if (myRole.includes("مافيا") || myRole.includes("طبيب") || myRole.includes("شرطة")) showBtn = true;
                    }

                    if (showBtn) {
                        div.innerHTML += `<button class="btn-act" onclick="act('${p.id}')">اختيار</button>`;
                    }
                    list.appendChild(div);
                }
            });
        });

        function act(tid) {
            const isNight = document.getElementById('status').innerText.includes("الليل");
            if (isNight) {
                let type = "";
                if (myRole.includes("مافيا")) type = "kill";
                else if (myRole.includes("طبيب")) type = "save";
                else if (myRole.includes("شرطة")) type = "check";
                
                if (type) socket.emit('nightAction', { room, targetId: tid, type });
            } else {
                socket.emit('submitVote', { room, targetId: tid });
            }
            document.getElementById('player-list').innerHTML = "<small>تم تأكيد اختيارك ✅</small>";
        }

        socket.on('assignRole', r => { myRole = r; document.getElementById('role').innerText = "هويتك: " + r; });
        socket.on('newMessage', d => {
            const div = document.createElement('div');
            div.innerHTML = `<b style="color:#ff3e3e">${d.sender}:</b> ${d.text}`;
            const box = document.getElementById('chatBox'); box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            if (d.sender === "النظام") speak(d.text);
        });

        function toggleMic() {
            micOn = !micOn; stream.getAudioTracks()[0].enabled = micOn;
            const btn = document.getElementById('micBtn');
            btn.innerText = micOn ? "🎤 الميكروفون: مفعّل" : "🔇 الميكروفون: مكتوم";
            btn.style.background = micOn ? "#238636" : "#7a0000";
        }

        function send() {
            const inp = document.getElementById('mInput');
            if (inp.value) { socket.emit('sendMessage', { room, text: inp.value }); inp.value = ""; }
        }

        function speak(t) {
            const m = new SpeechSynthesisUtterance(t);
            m.lang = 'ar-SA'; m.pitch = 0.6; m.rate = 0.9;
            window.speechSynthesis.speak(m);
        }
    </script>
</body>
</html>
