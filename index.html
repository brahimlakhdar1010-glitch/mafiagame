<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mafia Game Pro</title>
</head>
<body>

<h1>Mafia Game Pro 🎭</h1>

<div>
  <input id="username" placeholder="Username" />
  <input id="password" placeholder="Password" />
  <button onclick="createRoom()">Create Room</button>
</div>

<br>

<div>
  <input id="roomId" placeholder="Room ID" />
  <button onclick="joinRoom()">Join Room</button>
</div>

<hr>

<h3>Players</h3>
<ul id="players"></ul>

<button onclick="startGame()">Start Game</button>
<button onclick="enableMic()">🎤 Enable Microphone</button>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let currentRoom = null;

function createRoom() {
  socket.emit("createRoom", {
    username: username.value,
    password: password.value
  });
}

function joinRoom() {
  currentRoom = roomId.value;

  socket.emit("joinRoom", {
    roomId: currentRoom,
    username: username.value,
    password: password.value
  });
}

function startGame() {
  socket.emit("startGame", currentRoom);
}

socket.on("roomCreated", (data) => {
  currentRoom = data.roomId;
  alert("Room ID: " + currentRoom);
});

socket.on("updatePlayers", (players) => {
  const list = document.getElementById("players");
  list.innerHTML = "";

  players.forEach(p => {
    const li = document.createElement("li");
    li.textContent = p.username;
    list.appendChild(li);
  });
});

socket.on("roleAssigned", (role) => {
  alert("Your role: " + role);
});

socket.on("errorMsg", (msg) => alert(msg));

/* ================= Voice ================= */

let localStream;
let peerConnections = {};
const config = {
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

async function enableMic() {
  localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  alert("Microphone enabled 🎤");
}

socket.on("voiceOffer", async (data) => {
  const pc = new RTCPeerConnection(config);
  peerConnections[data.from] = pc;

  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  pc.onicecandidate = e => {
    if (e.candidate) {
      socket.emit("iceCandidate", {
        roomId: currentRoom,
        candidate: e.candidate
      });
    }
  };

  pc.ontrack = e => {
    const audio = document.createElement("audio");
    audio.srcObject = e.streams[0];
    audio.autoplay = true;
    document.body.appendChild(audio);
  };

  await pc.setRemoteDescription(data.offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  socket.emit("voiceAnswer", {
    roomId: currentRoom,
    answer
  });
});

socket.on("voiceAnswer", async (data) => {
  const pc = peerConnections[data.from];
  if (pc) await pc.setRemoteDescription(data.answer);
});

socket.on("iceCandidate", async (data) => {
  const pc = peerConnections[data.from];
  if (pc) await pc.addIceCandidate(data.candidate);
});
</script>

</body>
</html>
